<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; }
      .primary { fill: #eef2ff; stroke: #4338ca; }
      .planning { fill: #ecfdf5; stroke: #047857; }
      .visual { fill: #fff7ed; stroke: #c2410c; }
      .text { font: 22px Arial, sans-serif; fill: #111827; }
      .small { font: 18px Arial, sans-serif; fill: #374151; }
      .title { font: bold 30px Arial, sans-serif; fill: #111827; }
      .arrow { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#374151"/>
    </marker>
  </defs>

  <text x="700" y="50" text-anchor="middle" class="title">Drone Trajectory Pipeline in Marble Worlds</text>

  <rect x="70" y="105" width="260" height="90" class="box primary"/>
  <text x="200" y="142" text-anchor="middle" class="text">Input photo</text>
  <text x="200" y="170" text-anchor="middle" class="small">large street object</text>

  <rect x="420" y="105" width="300" height="90" class="box primary"/>
  <text x="570" y="142" text-anchor="middle" class="text">World Labs Marble</text>
  <text x="570" y="170" text-anchor="middle" class="small">generate 3D world</text>

  <rect x="810" y="105" width="260" height="90" class="box primary"/>
  <text x="940" y="142" text-anchor="middle" class="text">Marble Pro export</text>
  <text x="940" y="170" text-anchor="middle" class="small">scene assets</text>

  <line x1="330" y1="150" x2="420" y2="150" class="arrow"/>
  <line x1="720" y1="150" x2="810" y2="150" class="arrow"/>

  <rect x="180" y="285" width="280" height="90" class="box visual"/>
  <text x="320" y="322" text-anchor="middle" class="text">High-quality Mesh</text>
  <text x="320" y="350" text-anchor="middle" class="small">GLB for rendering</text>

  <rect x="560" y="285" width="280" height="90" class="box planning"/>
  <text x="700" y="322" text-anchor="middle" class="text">Collider Mesh</text>
  <text x="700" y="350" text-anchor="middle" class="small">GLB for planning</text>

  <rect x="940" y="285" width="280" height="90" class="box visual"/>
  <text x="1080" y="322" text-anchor="middle" class="text">Optional exports</text>
  <text x="1080" y="350" text-anchor="middle" class="small">panorama / splats</text>

  <line x1="900" y1="195" x2="320" y2="285" class="arrow"/>
  <line x1="940" y1="195" x2="700" y2="285" class="arrow"/>
  <line x1="980" y1="195" x2="1080" y2="285" class="arrow"/>

  <rect x="560" y="455" width="280" height="90" class="box planning"/>
  <text x="700" y="492" text-anchor="middle" class="text">Preprocess scene</text>
  <text x="700" y="520" text-anchor="middle" class="small">scale, clean, collisions</text>

  <rect x="560" y="615" width="280" height="90" class="box planning"/>
  <text x="700" y="652" text-anchor="middle" class="text">ROS2 + OMPL</text>
  <text x="700" y="680" text-anchor="middle" class="small">plan drone trajectory</text>

  <line x1="700" y1="375" x2="700" y2="455" class="arrow"/>
  <line x1="700" y1="545" x2="700" y2="615" class="arrow"/>

  <rect x="960" y="615" width="280" height="90" class="box planning"/>
  <text x="1100" y="652" text-anchor="middle" class="text">Trajectory</text>
  <text x="1100" y="680" text-anchor="middle" class="small">JSON / CSV</text>

  <line x1="840" y1="660" x2="960" y2="660" class="arrow"/>

  <rect x="180" y="615" width="280" height="90" class="box visual"/>
  <text x="320" y="652" text-anchor="middle" class="text">Visualization</text>
  <text x="320" y="680" text-anchor="middle" class="small">Blender / Unity / WebXR</text>

  <line x1="320" y1="375" x2="320" y2="615" class="arrow"/>
  <line x1="960" y1="660" x2="460" y2="660" class="arrow"/>

  <rect x="180" y="745" width="280" height="55" class="box visual"/>
  <text x="320" y="781" text-anchor="middle" class="text">Drone animation video</text>

  <rect x="560" y="745" width="280" height="55" class="box visual"/>
  <text x="700" y="781" text-anchor="middle" class="text">Optional Oculus view</text>

  <line x1="320" y1="705" x2="320" y2="745" class="arrow"/>
  <line x1="460" y1="685" x2="560" y2="755" class="arrow"/>
</svg>
